name: Update ClickUp Status

# Reusable workflow: updates ClickUp task status after deployment.
# Scans ALL commits in the push for CU-<taskId> references and updates each.
#
# Usage:
#   update-clickup:
#     needs: deploy
#     uses: ParamountDataManagement/.github/.github/workflows/update-clickup.yml@main
#     with:
#       status: IN DEV          # or IN QA, IN PRODUCTION
#     secrets:
#       CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}

on:
  workflow_call:
    inputs:
      status:
        description: 'Target ClickUp status (IN DEV, IN QA, IN PRODUCTION)'
        required: true
        type: string
    secrets:
      CLICKUP_API_TOKEN:
        required: true

jobs:
  update-clickup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update ClickUp Task Status
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          STATUS: ${{ inputs.status }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Validate status
          case "$STATUS" in
            "IN DEV"|"IN QA"|"IN PRODUCTION") ;;
            *)
              echo "::error::Invalid status '$STATUS'. Allowed: IN DEV, IN QA, IN PRODUCTION"
              exit 1
              ;;
          esac

          # Extract ALL unique CU-<taskId> references from all commits in this push.
          # This handles batch merges where multiple PRs deploy together.
          TASK_IDS=""

          if [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            # Normal push: scan all commits between before and after
            TASK_IDS=$(git log "${BEFORE_SHA}..${AFTER_SHA}" --pretty=%B 2>/dev/null | \
              grep -oE 'CU-[a-zA-Z0-9]{6,}' | sort -u || echo "")
          fi

          # Fallback: if no commits in range (first push, force push, etc.),
          # check the latest commit message and head_ref
          if [[ -z "$TASK_IDS" ]]; then
            BRANCH_NAME="${{ github.head_ref }}"
            if [[ -z "$BRANCH_NAME" ]]; then
              BRANCH_NAME=$(git log -1 --pretty=%B | head -1)
            fi
            TASK_IDS=$(echo "$BRANCH_NAME" | grep -oE 'CU-[a-zA-Z0-9]{6,}' | sort -u || echo "")
          fi

          if [[ -z "$TASK_IDS" ]]; then
            echo "No ClickUp task IDs found in any commits. Skipping."
            exit 0
          fi

          UPDATED=0
          FAILED=0

          for TASK_ID in $TASK_IDS; do
            CLEAN_ID="${TASK_ID#CU-}"
            echo "Updating $TASK_ID → $STATUS"

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              --connect-timeout 5 --max-time 20 --retry 2 --retry-delay 1 \
              "https://api.clickup.com/api/v2/task/$CLEAN_ID" \
              -H "Authorization: $CLICKUP_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"status\": \"$STATUS\"}" 2>/dev/null || echo "000")

            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Updated $TASK_ID to '$STATUS'"
              UPDATED=$((UPDATED + 1))
            else
              echo "::warning::ClickUp API returned HTTP $HTTP_CODE for $TASK_ID (non-blocking)"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "Summary: $UPDATED updated, $FAILED failed out of $(echo "$TASK_IDS" | wc -w | tr -d ' ') tasks"
